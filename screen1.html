<script>
        // Toggle Gift Tray
        const giftToggleBtn = document.getElementById('gift-toggle');
        const closeGiftBtn = document.getElementById('close-gift-tray');
        const giftTray = document.getElementById('gift-tray');

        function toggleGiftTray() {
            const isActive = giftTray.classList.contains('gift-tray-active');
            if (isActive) {
                giftTray.classList.remove('gift-tray-active');
                giftTray.classList.add('pointer-events-none');
            } else {
                giftTray.classList.add('gift-tray-active');
                giftTray.classList.remove('pointer-events-none');
            }
        }

        giftToggleBtn.addEventListener('click', toggleGiftTray);
        closeGiftBtn.addEventListener('click', toggleGiftTray);

        // Particle Animation Logic
        const container = document.getElementById('particle-container');
        const colors = ['#ff5f3d', '#e1027f', '#00a790', '#ffd9e3'];
        const icons = ['favorite', 'star', 'sparkles'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle material-symbols-outlined filled absolute right-10 bottom-32';
            
            // Randomize properties
            const color = colors[Math.floor(Math.random() * colors.length)];
            const icon = icons[Math.floor(Math.random() * icons.length)];
            const size = Math.random() * 16 + 16; // 16px to 32px
            const duration = Math.random() * 2 + 2; // 2s to 4s
            const delay = Math.random() * 2;
            const xOffset = (Math.random() - 0.5) * 100;

            particle.style.color = color;
            particle.style.fontSize = `${size}px`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${delay}s`;
            particle.innerText = icon;
            
            // Random horizontal drift using CSS variables or inline styles
            particle.style.left = `${Math.random() * 100}%`;

            container.appendChild(particle);

            // Cleanup
            setTimeout(() => {
                particle.remove();
            }, (duration + delay) * 1000);
        }

        // Generate particles periodically to simulate a stream of likes/reactions
        setInterval(createParticle, 400);
    </script>
