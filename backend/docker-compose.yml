services:

  # ── ASP.NET Core 10 API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qablny-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=qablny;Username=postgres;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Secret:         ${JWT_SECRET}
      Jwt__Issuer:         qablny-api
      Jwt__Audience:       qablny-app
      Jwt__ExpiryMinutes:  "60"
      LiveKit__ApiKey:     ${LIVEKIT_API_KEY}
      LiveKit__ApiSecret:  ${LIVEKIT_API_SECRET}
      LiveKit__ServerUrl:  http://livekit:7880
      LiveKit__PublicUrl:  ${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      MinIO__Endpoint:     minio:9000
      MinIO__AccessKey:    ${MINIO_ACCESS_KEY}
      MinIO__SecretKey:    ${MINIO_SECRET_KEY}
      MinIO__PublicUrl:    ${MINIO_PUBLIC_URL:-http://localhost:9000}
      LibreTranslate__BaseUrl: http://libretranslate:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_started
    networks: [qablny]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qablny-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       qablny
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [qablny]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qablny-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks: [qablny]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LiveKit Server ────────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: qablny-livekit
    ports:
      - "7880:7880"   # HTTP/WS API
      - "7881:7881"   # TURN/TLS
      # - "50000-50010:50000-50010/udp"  # WebRTC UDP range (reduced for dev)
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: >
      --bind 0.0.0.0
      --port 7880
      --node-ip ${SERVER_IP:-127.0.0.1}
    networks: [qablny]
    restart: unless-stopped

  # ── MinIO (Object Storage) ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: qablny-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks: [qablny]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── LibreTranslate ────────────────────────────────────────────────────────────
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: qablny-translate
    ports:
      - "5001:5000"
    environment:
      LT_LOAD_ONLY: "ar,en,fr,tr"   # load only needed languages
      LT_UPDATE_MODELS: "false"
    networks: [qablny]
    restart: unless-stopped

  # ── PgAdmin (Dev Tool) ────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qablny-pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@qablny.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks: [qablny]
    profiles: [dev]

  # ── RedisInsight (Dev Tool) ───────────────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: qablny-redis-insight
    ports:
      - "8001:5540"
    networks: [qablny]
    profiles: [dev]

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  minio-data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  qablny:
    driver: bridge
